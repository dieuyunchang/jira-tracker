<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="hdr">
      <div class="title">
        <img src="icons/icon32.png" width="18" height="18" alt="" />
        <span>Jira Tracker</span>
      </div>
      <div id="status" class="status">…</div>
    </div>

    <button id="addPage" class="add-page" disabled>➕ Thêm page này</button>

    <div class="tabs">
      <button id="tabList" class="tab active">📋 Watch</button>
      <button id="tabUpdates" class="tab">
        🔔 Cập nhật<span id="tabCount" class="count"></span>
      </button>
      <button id="tabHistory" class="tab">🕘 History</button>
    </div>

    <div id="list" class="list"></div>

    <div id="updates" hidden>
      <div class="utools">
        <div class="seg">
          <button id="fUnread" class="seg-btn active">Chưa đọc</button>
          <button id="fAll" class="seg-btn">Tất cả</button>
        </div>
        <button id="markAll" class="ghost-sm">✓ Đã đọc hết</button>
      </div>
      <div id="ulist" class="list"></div>
    </div>
    <div id="history" hidden>
      <div id="hlist" class="list"></div>
    </div>

    <div class="ftr">
      <button id="pollNow" class="ghost">↻ Poll ngay</button>
      <button id="openOptions" class="ghost">⚙️ Settings</button>
    </div>

    <div id="toast" class="toast"></div>

    <script src="common.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
