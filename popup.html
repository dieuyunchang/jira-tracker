<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="hdr">
      <div class="title">
        <img src="icons/icon32.png" width="18" height="18" alt="" />
        <span>Jira Tracker</span>
      </div>
      <div id="status" class="status">…</div>
    </div>

    <button id="addPage" class="add-page" disabled>➕ Thêm page này</button>

    <div class="tabs">
      <button id="tabList" class="tab active">
        <span data-i18n="tab_watch">📋 Watch</span>
      </button>
      <button id="tabUpdates" class="tab">
        <span data-i18n="tab_updates">🔔 Cập nhật</span
        ><span id="tabCount" class="count"></span>
      </button>
      <button id="tabHistory" class="tab">
        <span data-i18n="tab_history">🕘 History</span>
      </button>
    </div>

    <div id="list" class="list"></div>

    <div id="updates" hidden>
      <div class="utools">
        <div class="seg">
          <button id="fUnread" class="seg-btn active" data-i18n="filter_unread">Chưa đọc</button>
          <button id="fAll" class="seg-btn" data-i18n="filter_all">Tất cả</button>
        </div>
        <button id="markAll" class="ghost-sm" data-i18n="mark_all_read">✓ Đã đọc hết</button>
      </div>
      <div id="ulist" class="list"></div>
    </div>
    <div id="history" hidden>
      <div id="hlist" class="list"></div>
    </div>

    <div class="ftr">
      <button id="pollNow" class="ghost" data-i18n="poll_now">↻ Poll ngay</button>
      <button id="openOptions" class="ghost" data-i18n="settings">⚙️ Settings</button>
    </div>

    <div id="toast" class="toast"></div>

    <script src="common.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
