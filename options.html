<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jira Tracker — Settings</title>
    <style>
      :root {
        --blue: #2667e0;
        --ink: #172b4d;
        --sub: #6b778c;
        --line: #ebecf0;
      }
      body {
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Arial, sans-serif;
        color: var(--ink);
        max-width: 640px;
        margin: 24px auto;
        padding: 0 18px 60px;
      }
      h1 {
        font-size: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 16px 18px;
        margin: 16px 0;
      }
      .card h2 {
        font-size: 14px;
        margin: 0 0 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--sub);
      }
      label.row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 8px 0;
      }
      label.row input[type="checkbox"] {
        width: 16px;
        height: 16px;
      }
      .field {
        margin: 10px 0;
      }
      .field label {
        display: block;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .hint {
        color: var(--sub);
        font-size: 12px;
        margin-top: 3px;
      }
      input[type="text"],
      input[type="number"],
      input[type="time"],
      textarea,
      select {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #c1c7d0;
        border-radius: 6px;
        font: inherit;
        box-sizing: border-box;
      }
      textarea {
        min-height: 110px;
        resize: vertical;
      }
      .inline {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .inline > div {
        flex: 1;
      }
      .actions {
        position: sticky;
        bottom: 0;
        background: #fff;
        padding: 14px 0;
        border-top: 1px solid var(--line);
        display: flex;
        gap: 10px;
        align-items: center;
      }
      button {
        border: none;
        border-radius: 6px;
        padding: 9px 16px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      .primary {
        background: var(--blue);
        color: #fff;
      }
      .ghost {
        background: #fff;
        border: 1px solid var(--line);
        color: var(--ink);
      }
      #saved {
        color: #36b37e;
        font-weight: 600;
        opacity: 0;
        transition: opacity 0.2s;
      }
      #saved.show {
        opacity: 1;
      }
      .credit {
        text-align: center;
        color: var(--sub);
        font-size: 12px;
        margin-top: 18px;
      }
    </style>
  </head>
  <body>
    <h1><img src="icons/icon32.png" width="22" height="22" alt="" /> Jira Tracker — Settings</h1>

    <div class="card">
      <div class="field">
        <label data-i18n="opt_lang">Ngôn ngữ / Language</label>
        <select id="lang">
          <option value="vi">Tiếng Việt</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="opt_conn">Kết nối & tần suất</h2>
      <div class="field">
        <label data-i18n="opt_base">Jira base URL</label>
        <input type="text" id="jiraBase" placeholder="https://jira.company.xyz" />
        <div class="hint" data-i18n="opt_base_hint"></div>
      </div>
      <div class="field">
        <label data-i18n="opt_poll">Tần suất poll (phút)</label>
        <input type="number" id="pollMinutes" min="1" max="120" />
        <div class="hint" data-i18n="opt_poll_hint"></div>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="opt_notif">Thông báo loại nào</h2>
      <label class="row"><input type="checkbox" id="n_status" /> <span data-i18n="opt_n_status"></span></label>
      <label class="row"><input type="checkbox" id="n_assigned" /> <span data-i18n="opt_n_assigned"></span></label>
      <label class="row"><input type="checkbox" id="n_comment" /> <span data-i18n="opt_n_comment"></span></label>
      <label class="row"><input type="checkbox" id="n_mention" /> <span data-i18n="opt_n_mention"></span></label>
      <div class="field">
        <label data-i18n="opt_maxchanges">Số thay đổi tối đa</label>
        <input type="number" id="maxNotifChanges" min="1" max="20" />
        <div class="hint" data-i18n="opt_maxchanges_hint"></div>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="opt_ignore_h">Bỏ qua comment chứa text</h2>
      <div class="field">
        <label data-i18n="opt_ignore_lbl"></label>
        <textarea id="commentIgnore" placeholder="mentioned this issue in a merge request of"></textarea>
        <div class="hint" data-i18n="opt_ignore_hint"></div>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="opt_autoadd">Tự động thêm vào watch list</h2>
      <label class="row"><input type="checkbox" id="a_assigned" /> <span data-i18n="opt_a_assigned"></span></label>
      <label class="row"><input type="checkbox" id="a_watcher" /> <span data-i18n="opt_a_watcher"></span></label>
      <label class="row"><input type="checkbox" id="a_reporter" /> <span data-i18n="opt_a_reporter"></span></label>
      <div class="field">
        <label data-i18n="opt_lookback"></label>
        <input type="number" id="lookback" min="1" max="90" />
        <div class="hint" data-i18n="opt_lookback_hint"></div>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="opt_history">History</h2>
      <label class="row">
        <input type="checkbox" id="historyCopyIncludeTitle" />
        <span data-i18n="opt_copytitle"></span>
      </label>
      <div class="hint" data-i18n="opt_copytitle_hint"></div>
      <div class="field">
        <label data-i18n="opt_retention">Số ngày lưu lịch sử</label>
        <input type="number" id="visitsRetentionDays" min="7" max="60" />
        <div class="hint" data-i18n="opt_retention_hint"></div>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="opt_endstatus_h">Tự gỡ khi ticket kết thúc</h2>
      <div class="field">
        <label data-i18n="opt_endstatus_lbl"></label>
        <textarea id="endStatuses"></textarea>
        <div class="hint" data-i18n="opt_endstatus_hint"></div>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="opt_vpn">VPN / mạng</h2>
      <label class="row">
        <input type="checkbox" id="pausedAutoProbe" />
        <span data-i18n="opt_probe"></span>
      </label>
      <div class="hint" data-i18n="opt_probe_hint"></div>
      <div class="field">
        <label data-i18n="opt_probemin">Nhịp dò khi tạm dừng (phút)</label>
        <input type="number" id="probeMinutes" min="5" max="180" />
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="opt_quiet">Quiet hours</h2>
      <label class="row"><input type="checkbox" id="q_enabled" /> <span data-i18n="opt_quiet_enable"></span></label>
      <div class="inline">
        <div class="field"><label data-i18n="opt_from">Từ</label><input type="time" id="q_start" /></div>
        <div class="field"><label data-i18n="opt_to">Đến</label><input type="time" id="q_end" /></div>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="opt_other">Khác</h2>
      <div class="inline">
        <div class="field"><label data-i18n="opt_maxtracked">Giới hạn số ticket track</label><input type="number" id="maxTracked" min="10" max="500" /></div>
        <div class="field"><label data-i18n="opt_histdays">Giữ lịch sử (ngày)</label><input type="number" id="historyDays" min="1" max="90" /></div>
      </div>
      <div class="field">
        <button class="ghost" id="exportBtn" data-i18n="opt_export">⬇ Export (backup)</button>
        <button class="ghost" id="importBtn" data-i18n="opt_import">⬆ Import</button>
        <input type="file" id="importFile" accept="application/json" style="display:none" />
      </div>
    </div>

    <div class="actions">
      <button class="primary" id="save" data-i18n="opt_save">Lưu</button>
      <span id="saved"></span>
    </div>

    <div class="credit">tạo bởi Yunchang Dieu</div>

    <script src="common.js"></script>
    <script src="options.js"></script>
  </body>
</html>
